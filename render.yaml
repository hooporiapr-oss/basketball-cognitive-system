services:
  - type: web
    name: reactific-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reactific-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: CLIENT_URL
        value: https://reactific.co

databases:
  - name: reactific-db
    plan: starter
    postgresMajorVersion: 16
