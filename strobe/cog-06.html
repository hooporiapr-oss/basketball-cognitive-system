<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strobe Reactific™ Working Model</title>
<style>
:root{
  --black:#030303;
  --white:#f4f4f4;
  --muted:#8f8f9b;
  --line:rgba(255,255,255,.14);
  --panel:rgba(255,255,255,.055);
  --lime:#39FF14;
  --gold:#FFD700;
  --cyan:#00bbf0;
  --red:#ff3b3b;
  --orange:#f28a1f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--black);
  color:var(--white);
  font-family:Arial,Helvetica,sans-serif;
  user-select:none;
  -webkit-user-select:none;
}
body{
  background:
    radial-gradient(circle at 12% 12%,rgba(57,255,20,.14),transparent 28%),
    radial-gradient(circle at 88% 14%,rgba(0,187,240,.12),transparent 30%),
    radial-gradient(circle at 50% 105%,rgba(242,138,31,.12),transparent 40%),
    #030303;
}
.app{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:86px 108px 1fr 96px;
  gap:12px;
  padding:18px 26px 20px;
}
.top{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}
.logo{
  font-size:clamp(1.8rem,3vw,3.6rem);
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.logo span{color:var(--lime)}
.mode{
  justify-self:center;
  border:1px solid rgba(57,255,20,.35);
  background:rgba(57,255,20,.08);
  color:var(--lime);
  padding:10px 22px;
  border-radius:999px;
  font-size:clamp(.8rem,1.15vw,1.1rem);
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.score{
  justify-self:end;
  color:var(--muted);
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.score b{color:var(--lime);font-size:1.4rem}
.hud{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:20px;
}
.hud-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:22px;
  padding:14px 22px;
}
.clock{
  justify-self:start;
  display:flex;
  align-items:center;
  gap:18px;
  min-width:260px;
}
.label{
  color:var(--muted);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:.8rem;
}
.clock-num{
  color:var(--red);
  font-size:4.2rem;
  line-height:1;
  font-weight:900;
  text-shadow:0 0 22px rgba(255,59,59,.55);
}
.target{
  justify-self:center;
  display:flex;
  align-items:center;
  gap:22px;
  border-color:rgba(255,215,0,.28);
  background:rgba(255,215,0,.06);
}
.target-num{
  color:var(--lime);
  font-size:5rem;
  line-height:1;
  font-weight:900;
  min-width:120px;
  text-align:center;
  text-shadow:0 0 24px rgba(57,255,20,.6);
}
.round{
  justify-self:end;
  min-width:220px;
  text-align:right;
  color:var(--muted);
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.round b{color:var(--cyan);font-size:1.5rem}
.court-zone{
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.court{
  width:min(calc(100vh - 330px), 72vw);
  max-width:680px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:12px;
  padding:18px;
  border:2px solid var(--line);
  border-radius:30px;
  background:rgba(255,255,255,.045);
  box-shadow:0 0 65px rgba(0,0,0,.6);
  transition:filter .08s linear, opacity .08s linear;
}
.court.dim-soft{filter:brightness(.55) contrast(1.1)}
.court.dim-medium{filter:brightness(.36) contrast(1.18)}
.court.dim-hard{opacity:.18}
.cell{
  border:2px solid rgba(255,255,255,.14);
  border-radius:18px;
  background:rgba(255,255,255,.07);
  color:rgba(255,255,255,.82);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(2.4rem,4.4vw,4.5rem);
  font-weight:900;
  cursor:pointer;
  transition:transform .08s ease, background .12s ease, border-color .12s ease;
}
.cell:hover{border-color:rgba(57,255,20,.35)}
.cell:active{transform:scale(.94)}
.cell.hit{
  background:var(--lime);
  border-color:var(--lime);
  color:#001400;
  box-shadow:0 0 34px rgba(57,255,20,.75);
}
.cell.wrong{
  background:rgba(255,59,59,.42);
  border-color:var(--red);
  color:#fff;
}
.bottom{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
}
.info{
  color:var(--muted);
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-size:.85rem;
}
.controls{
  justify-self:center;
  display:flex;
  align-items:center;
  gap:12px;
}
button{
  font-family:Arial,Helvetica,sans-serif;
  cursor:pointer;
}
.btn{
  border:none;
  border-radius:999px;
  padding:18px 34px;
  font-weight:900;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-size:1rem;
}
.start{
  background:linear-gradient(135deg,var(--lime),#2bc10f);
  color:#001400;
  box-shadow:0 0 34px rgba(57,255,20,.35);
}
.start:disabled{
  opacity:.75;
  cursor:not-allowed;
}
.full{
  background:rgba(255,255,255,.08);
  color:var(--white);
  border:1px solid var(--line);
}
.strobe{
  justify-self:end;
  display:flex;
  align-items:center;
  gap:8px;
}
.pill{
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:var(--muted);
  border-radius:999px;
  padding:11px 15px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.pill.active{
  color:var(--lime);
  border-color:var(--lime);
  background:rgba(57,255,20,.12);
}
.notice{
  position:fixed;
  left:50%;
  bottom:118px;
  transform:translateX(-50%) translateY(30px);
  opacity:0;
  background:linear-gradient(135deg,var(--lime),#2bc10f);
  color:#001400;
  border-radius:18px;
  padding:14px 24px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  transition:all .25s ease;
  z-index:10;
}
.notice.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
@media(max-width:900px){
  html,body{overflow:auto}
  .app{
    height:auto;
    min-height:100vh;
    grid-template-rows:auto auto auto auto;
    padding:16px;
  }
  .top,.hud,.bottom{grid-template-columns:1fr;text-align:center}
  .mode,.score,.clock,.target,.round,.strobe{justify-self:center;text-align:center}
  .court{width:92vw}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo">STROBE <span>REACTIFIC™</span></div>
    <div class="mode">Working Model</div>
    <div class="score">Score: <b id="score">0</b></div>
  </header>

  <section class="hud">
    <div class="hud-card clock">
      <div class="label">Shot Clock</div>
      <div class="clock-num" id="clock">05</div>
    </div>

    <div class="hud-card target">
      <div class="label">Find</div>
      <div class="target-num" id="target">—</div>
    </div>

    <div class="hud-card round">Round: <b id="round">0</b></div>
  </section>

  <main class="court-zone">
    <div class="court" id="court"></div>
  </main>

  <footer class="bottom">
    <div class="info">5×5 Court · 25 Zones</div>

    <div class="controls">
      <button class="btn start" id="startBtn" type="button">Start Round</button>
      <button class="btn full" id="fullBtn" type="button">Fullscreen</button>
    </div>

    <div class="strobe">
      <button class="pill active" data-mode="soft" type="button">Soft</button>
      <button class="pill" data-mode="medium" type="button">Medium</button>
      <button class="pill" data-mode="hard" type="button">Hard</button>
      <button class="pill" data-mode="off" type="button">Off</button>
    </div>
  </footer>
</div>

<div class="notice" id="notice">Located</div>

<script>
(function(){
  const court = document.getElementById('court');
  const startBtn = document.getElementById('startBtn');
  const fullBtn = document.getElementById('fullBtn');
  const targetEl = document.getElementById('target');
  const clockEl = document.getElementById('clock');
  const scoreEl = document.getElementById('score');
  const roundEl = document.getElementById('round');
  const notice = document.getElementById('notice');

  let cells = [];
  let targetNum = null;
  let score = 0;
  let round = 0;
  let playing = false;
  let timeLeft = 5;
  let timer = null;
  let strobeTimer = null;
  let strobeMode = 'soft';

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  function buildCourt(){
    court.innerHTML = '';
    cells = [];
    const nums = shuffle(Array.from({length:25},(_,i)=>i+1));
    nums.forEach(n=>{
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = n;
      cell.dataset.num = n;
      cell.addEventListener('click',()=>tapCell(cell));
      court.appendChild(cell);
      cells.push(cell);
    });
  }

  function showNotice(msg){
    notice.textContent = msg;
    notice.classList.add('show');
    setTimeout(()=>notice.classList.remove('show'),900);
  }

  function stopStrobe(){
    if(strobeTimer) clearInterval(strobeTimer);
    strobeTimer = null;
    court.classList.remove('dim-soft','dim-medium','dim-hard');
  }

  function startStrobe(){
    stopStrobe();
    if(strobeMode === 'off') return;

    let cls = 'dim-soft';
    let pace = 360;

    if(strobeMode === 'medium'){
      cls = 'dim-medium';
      pace = 280;
    }

    if(strobeMode === 'hard'){
      cls = 'dim-hard';
      pace = 220;
    }

    strobeTimer = setInterval(()=>{
      court.classList.toggle(cls);
    }, pace);
  }

  function setMode(mode){
    strobeMode = mode;
    document.querySelectorAll('.pill').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
    if(playing) startStrobe();
  }

  function startRound(){
    if(playing) return;

    playing = true;
    round += 1;
    roundEl.textContent = round;

    buildCourt();

    targetNum = Math.floor(Math.random()*25)+1;
    targetEl.textContent = targetNum;

    timeLeft = 5;
    clockEl.textContent = '05';

    startBtn.disabled = true;
    startBtn.textContent = 'Playing';

    startStrobe();

    timer = setInterval(()=>{
      timeLeft -= 1;
      clockEl.textContent = String(timeLeft).padStart(2,'0');

      if(timeLeft <= 0){
        failRound('Time');
      }
    },1000);
  }

  function endRound(){
    playing = false;
    startBtn.disabled = false;
    startBtn.textContent = 'Start Round';

    if(timer) clearInterval(timer);
    timer = null;

    stopStrobe();
  }

  function success(cell){
    cell.classList.add('hit');
    score += 10 + (timeLeft * 2);
    scoreEl.textContent = score;
    showNotice('Located');
    endRound();
  }

  function failRound(reason){
    showNotice(reason === 'wrong' ? 'Wrong Tap' : 'Time');
    cells.forEach(cell=>{
      if(Number(cell.dataset.num) === targetNum){
        cell.classList.add('hit');
      }
    });
    endRound();
  }

  function tapCell(cell){
    if(!playing) return;

    const num = Number(cell.dataset.num);

    if(num === targetNum){
      success(cell);
    }else{
      cell.classList.add('wrong');
      failRound('wrong');
    }
  }

  document.querySelectorAll('.pill').forEach(btn=>{
    btn.addEventListener('click',()=>setMode(btn.dataset.mode));
  });

  startBtn.addEventListener('click', startRound);

  fullBtn.addEventListener('click',()=>{
    const el = document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  });

  buildCourt();
})();
</script>
</body>
</html>
