<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shot Clock Challenges™ STROBE™</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#030303;
color:#fff
}
body{
background:
radial-gradient(circle at 15% 10%,rgba(57,255,20,.12),transparent 30%),
linear-gradient(#040404,#020202);
}
.app{
height:100vh;
display:grid;
grid-template-rows:72px 78px 1fr 86px;
gap:10px;
padding:10px 18px;
overflow:hidden;
}
.top{
display:grid;
grid-template-columns:1fr auto auto;
align-items:center;
}
.logo{
font-weight:900;
font-size:clamp(1.2rem,2vw,2.6rem);
letter-spacing:.1em;
}
.logo span{color:#39FF14}

.full{
cursor:pointer;
border:none;
padding:12px 18px;
border-radius:999px;
background:#00bbf022;
color:#00bbf0;
font-weight:900;
}

.target{
display:flex;
justify-content:center;
align-items:center;
gap:18px;
background:#FFD70010;
border:1px solid #FFD70040;
border-radius:18px;
padding:8px 18px;
max-width:420px;
margin:auto;
}

.target label{
color:#FFD700;
font-weight:900;
letter-spacing:.15em;
}

.target div{
font-size:3.4rem;
font-weight:900;
color:#39FF14;
}

.middle{
display:grid;
grid-template-columns:180px 1fr 180px;
gap:12px;
min-height:0;
align-items:center;
}

.side{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#ffffff08;
border:1px solid #ffffff14;
padding:16px;
border-radius:18px;
}

.card h3{
font-size:.7rem;
color:#999;
margin-bottom:8px;
}

.big{
font-size:2.6rem;
font-weight:900;
color:#39FF14;
}

.courtwrap{
display:flex;
justify-content:center;
align-items:center;
min-height:0;
}

.court{
width:min(72vh,72vw);
aspect-ratio:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:12px;
background:#ffffff08;
border-radius:22px;
transition:.06s;
}

.soft{filter:brightness(.62)}
.medium{filter:brightness(.42)}
.hard{opacity:.18}

.cell{
display:flex;
justify-content:center;
align-items:center;
background:#ffffff10;
border-radius:14px;
font-size:clamp(1.7rem,3vw,3rem);
font-weight:900;
cursor:pointer;
}

.hit{
background:#39FF14!important;
color:#001500;
}

.bottom{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
}

.start{
padding:18px 44px;
border:none;
border-radius:999px;
background:#39FF14;
font-weight:900;
cursor:pointer;
}

.msg{
text-align:center;
color:#FFD700;
font-weight:900;
}

@media(max-width:900px){
html,body{
overflow:auto;
}
.app{
height:auto;
min-height:100vh;
grid-template-rows:auto auto auto auto;
overflow:visible;
}
.middle{
grid-template-columns:1fr;
}
.court{
width:92vw;
}
.bottom{
grid-template-columns:1fr;
gap:10px;
}
}
</style>
</head>
<body>
<div class="app">

<div class="top">
<div class="logo">SHOT CLOCK <span>STROBE™</span></div>
<button class="full" id="full">FULLSCREEN</button>
</div>

<div class="target">
<label>FIND</label>
<div id="target">—</div>
</div>

<div class="middle">

<div class="side">
<div class="card"><h3>CLOCK</h3><div class="big" id="clock">7</div></div>
</div>

<div class="courtwrap">
<div class="court" id="court"></div>
</div>

<div class="side">
<div class="card"><h3>SCORE</h3><div class="big" id="score">0</div></div>
</div>

</div>

<div class="bottom">
<div></div>
<div>
<button class="start" id="start">START ROUND</button>
</div>
<div class="msg">NO SCROLL DESKTOP + MOBILE</div>
</div>

</div>

<script>
const court=document.getElementById("court");
const target=document.getElementById("target");
const clock=document.getElementById("clock");
const score=document.getElementById("score");
const start=document.getElementById("start");

let active=null;
let running=false;

function build(){
court.innerHTML="";
let nums=[...Array(25)].map((_,i)=>i+1).sort(()=>Math.random()-.5);

nums.forEach(n=>{
let d=document.createElement("div");
d.className="cell";
d.innerHTML=n;

d.onclick=()=>{
if(!running)return;

if(n===active){
d.classList.add("hit");
score.innerHTML=parseInt(score.innerHTML)+10;
running=false;
}
};

court.appendChild(d);
});
}

build();

start.onclick=()=>{
running=true;
active=Math.ceil(Math.random()*25);
target.innerHTML=active;
};

document.getElementById("full").onclick=async ()=>{
try{
if(!document.fullscreenElement){
await document.documentElement.requestFullscreen();
}else{
await document.exitFullscreen();
}
}catch(e){}
};
</script>

</body></html>
