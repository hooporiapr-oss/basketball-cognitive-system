<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REACTIFIC™ VR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
body{margin:0;overflow:hidden;background:#000}
#hud{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;justify-content:center;gap:20px;padding:12px;background:rgba(0,0,0,.8);font-family:Arial,sans-serif;color:#fff;font-weight:900}
.hud-item{text-align:center}
.hud-val{font-size:1.4rem;color:#f28a1f}
.hud-lbl{font-size:.55rem;color:#888;text-transform:uppercase;letter-spacing:.1em}
#startBtn{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:999;padding:16px 40px;background:linear-gradient(135deg,#f28a1f,#d97a1a);color:#000;border:none;border-radius:12px;font-size:1.2rem;font-weight:900;letter-spacing:.1em;cursor:pointer;box-shadow:0 0 30px rgba(242,138,31,.4)}
#glassesBtn{position:fixed;bottom:30px;right:16px;z-index:999;padding:12px 18px;background:rgba(0,187,240,.85);color:#000;border:none;border-radius:10px;font-size:.75rem;font-weight:900;cursor:pointer}
#glassesBtn.on{background:#ff3030;color:#fff}
#msgOverlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;color:#fff;font-size:2rem;font-weight:900;font-family:Arial;text-shadow:0 0 20px rgba(242,138,31,.8);pointer-events:none;opacity:0;transition:opacity .3s}
#msgOverlay.show{opacity:1}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-item"><div class="hud-val" id="hudScore">0</div><div class="hud-lbl">Score</div></div>
  <div class="hud-item"><div class="hud-val" id="hudClock">5.0</div><div class="hud-lbl">Shot Clock</div></div>
  <div class="hud-item"><div class="hud-val" id="hudFind">—</div><div class="hud-lbl">Find</div></div>
  <div class="hud-item"><div class="hud-val" id="hudLevel">1</div><div class="hud-lbl">Level</div></div>
  <div class="hud-item"><div class="hud-val" id="hudStreak">0</div><div class="hud-lbl">🔥</div></div>
</div>
<button id="startBtn" onclick="startRound()">START ROUND</button>
<button id="glassesBtn" onclick="toggle3D()">🕶️ 3D GLASSES</button>
<div id="msgOverlay"></div>

<a-scene id="scene" vr-mode-ui="enabled:true" renderer="antialias:true" background="color:#02050a">

  <a-sky color="#02050a"></a-sky>
  <a-entity light="type:ambient;color:#334;intensity:0.4"></a-entity>
  <a-entity light="type:directional;color:#fff;intensity:0.6" position="2 4 3"></a-entity>
  <a-entity light="type:point;color:#f28a1f;intensity:0.3;distance:12" position="0 3 -2"></a-entity>

  <a-plane position="0 -0.5 0" rotation="-90 0 0" width="20" height="20" material="color:#060a12;opacity:0.9"></a-plane>

  <a-entity id="rig" position="0 1.6 2.2">
    <a-camera id="cam" wasd-controls="enabled:true" look-controls="enabled:true">
      <a-cursor raycaster="objects:.cell" fuse="false" color="#f28a1f" position="0 0 -1"
        geometry="primitive:ring;radiusInner:0.008;radiusOuter:0.015"
        material="color:#f28a1f;shader:flat"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- VR HUD -->
  <a-entity id="vrHud" position="0 3.2 -3">
    <a-text id="vrTitle" value="REACTIFIC™" align="center" color="#f28a1f" width="8" position="0 0.8 0"></a-text>
    <a-text id="vrClock" value="5.0" align="center" color="#fff" width="12" position="0 0 0"></a-text>
    <a-text id="vrClockLbl" value="SHOT CLOCK" align="center" color="#888" width="4" position="0 -0.4 0"></a-text>
    <a-text id="vrFind" value="FIND: —" align="center" color="#39FF14" width="6" position="0 -0.8 0"></a-text>
    <a-text id="vrScore" value="SCORE: 0" align="center" color="#f28a1f" width="4" position="-2 -0.8 0"></a-text>
    <a-text id="vrStreak" value="🔥 0" align="center" color="#FFD700" width="3" position="2 -0.8 0"></a-text>
    <a-text id="vrMsg" value="" align="center" color="#fff" width="8" position="0 -1.3 0"></a-text>
  </a-entity>

  <a-entity id="gridContainer" position="0 1.2 -2.5"></a-entity>

  <a-torus position="0 2.7 -2.5" radius="0.4" radius-tubular="0.02" material="color:#222;shader:flat" segments-tubular="60"></a-torus>
  <a-torus id="clockRing" position="0 2.7 -2.5" radius="0.4" radius-tubular="0.025"
    material="color:#00bbf0;shader:flat;emissive:#00bbf0;emissiveIntensity:0.4"
    segments-tubular="60" theta-length="360" rotation="0 0 90"></a-torus>

</a-scene>

<script>
(function(){
const scene=document.getElementById('scene');
const gridContainer=document.getElementById('gridContainer');
const clockRing=document.getElementById('clockRing');

let grid=[],numbers=[],targets=[],found=[];
let level=1,score=0,streak=0,playing=false,canTap=false;
let timeLeft=0,totalTime=5000,clockInterval=null;
let audioCtx=null;
const S=0.38,G=0.06;

function tone(f,d){if(!audioCtx)try{audioCtx=new AudioContext()}catch(e){return}try{if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(0.25,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d+0.05)}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function showMsg(t,d){const o=document.getElementById('msgOverlay');o.textContent=t;o.classList.add('show');const v=document.getElementById('vrMsg');if(v)v.setAttribute('value',t);setTimeout(()=>{o.classList.remove('show');if(v)v.setAttribute('value','')},d||1500)}

function buildGrid(){
  gridContainer.innerHTML='';grid=[];
  numbers=shuffle(Array.from({length:25},(_,i)=>i+1));
  const off=(4*(S+G))/2;
  for(let i=0;i<25;i++){
    const r=Math.floor(i/5),c=i%5;
    const x=c*(S+G)-off,y=-(r*(S+G)-off);
    const el=document.createElement('a-entity');
    el.setAttribute('geometry',`primitive:box;width:${S};height:${S};depth:0.04`);
    el.setAttribute('material','color:#1a1a2e;emissive:#0a0a1a;roughness:0.8');
    el.setAttribute('position',`${x} ${y} 0`);
    el.setAttribute('class','cell');
    el.dataset.index=i;el.dataset.num=numbers[i];
    const txt=document.createElement('a-text');
    txt.setAttribute('value',String(numbers[i]));
    txt.setAttribute('align','center');txt.setAttribute('color','#667');
    txt.setAttribute('width','1.8');txt.setAttribute('position','0 0 0.03');
    el.appendChild(txt);
    el.addEventListener('click',function(){handleTap(this)});
    el.addEventListener('mouseenter',function(){if(canTap)this.setAttribute('material','emissive','#222244')});
    el.addEventListener('mouseleave',function(){if(!this.dataset.hit)this.setAttribute('material','emissive','#0a0a1a')});
    gridContainer.appendChild(el);
    grid.push({el,txt,num:numbers[i]});
  }
}

function reshuffleGrid(){
  numbers=shuffle(Array.from({length:25},(_,i)=>i+1));
  grid.forEach((c,i)=>{c.num=numbers[i];c.el.dataset.num=numbers[i];c.txt.setAttribute('value',String(numbers[i]));c.txt.setAttribute('color','#667');c.el.setAttribute('material','color:#1a1a2e;emissive:#0a0a1a');c.el.dataset.hit=''});
}

function updateHud(){
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudLevel').textContent=level;
  document.getElementById('hudStreak').textContent=streak;
  const vs=document.getElementById('vrScore');if(vs)vs.setAttribute('value','SCORE: '+score);
  const vk=document.getElementById('vrStreak');if(vk)vk.setAttribute('value','🔥 '+streak);
}

function updateClock(){
  const s=Math.max(0,timeLeft/1000).toFixed(1);
  document.getElementById('hudClock').textContent=s;
  const vc=document.getElementById('vrClock');if(vc)vc.setAttribute('value',s);
  const pct=Math.max(0,timeLeft/totalTime);
  clockRing.setAttribute('theta-length',pct*360);
  const col=pct<0.1?'#FF1493':pct<0.25?'#FF3030':pct<0.5?'#f28a1f':'#00bbf0';
  clockRing.setAttribute('material','color',col);clockRing.setAttribute('material','emissive',col);
  document.getElementById('hudClock').style.color=col;
}

function startClock(){
  totalTime=level<=3?5000:level<=6?3000:2000;timeLeft=totalTime;updateClock();
  if(clockInterval)clearInterval(clockInterval);
  clockInterval=setInterval(()=>{
    timeLeft-=50;updateClock();
    if(timeLeft<=0){clearInterval(clockInterval);clockInterval=null;if(canTap){canTap=false;roundFail('TOO SLOW')}}
  },50);
}
function stopClock(){if(clockInterval){clearInterval(clockInterval);clockInterval=null}}

function pickTargets(){
  const count=Math.min(level,10);
  targets=shuffle(Array.from({length:25},(_,i)=>i+1)).slice(0,count);found=[];
  const d=targets.join(' · ');
  document.getElementById('hudFind').textContent=d;
  const vf=document.getElementById('vrFind');if(vf)vf.setAttribute('value','FIND: '+d);
}

window.startRound=function(){
  if(playing)return;playing=true;canTap=false;
  document.getElementById('startBtn').style.display='none';
  reshuffleGrid();pickTargets();updateHud();
  showMsg('MEMORIZE!',1000);tone(880,0.12);
  setTimeout(()=>{showMsg('FIND THEM!',800);canTap=true;startClock()},1200);
};

function handleTap(el){
  if(!canTap||!playing)return;
  const num=parseInt(el.dataset.num);if(el.dataset.hit==='true')return;
  if(targets.includes(num)){
    el.dataset.hit='true';
    el.setAttribute('material','color:#f28a1f;emissive:#f28a1f;emissiveIntensity:0.5');
    el.querySelector('a-text').setAttribute('color','#fff');
    found.push(num);tone(740,0.08);
    el.setAttribute('animation','property:scale;to:1.15 1.15 1.15;dur:120;easing:easeOutQuad');
    setTimeout(()=>el.setAttribute('animation','property:scale;to:1 1 1;dur:200'),150);
    if(found.length>=targets.length){canTap=false;stopClock();setTimeout(()=>roundWin(),300)}
  }else{
    el.setAttribute('material','color:#FF1493;emissive:#FF1493;emissiveIntensity:0.3');
    tone(180,0.3);canTap=false;stopClock();
    setTimeout(()=>{grid.forEach(c=>{if(targets.includes(c.num)&&!found.includes(c.num)){c.el.setAttribute('material','color:#39FF14;emissive:#39FF14;emissiveIntensity:0.3');c.txt.setAttribute('color','#fff')}})},400);
    setTimeout(()=>roundFail('WRONG TAP'),1800);
  }
}

function roundWin(){
  const pts=targets.length*50+Math.floor(timeLeft/100);score+=pts;streak++;
  if(streak>0&&streak%3===0&&level<10)level++;
  showMsg(streak>=5?'🏆 LEGEND!':streak>=3?'🔥 FIRE!':'✅ NICE!',1500);
  tone(523,0.12);setTimeout(()=>tone(659,0.12),80);setTimeout(()=>tone(784,0.12),160);
  updateHud();playing=false;
  setTimeout(()=>{document.getElementById('startBtn').style.display='block';document.getElementById('startBtn').textContent='NEXT ROUND'},1800);
}

function roundFail(msg){
  streak=0;showMsg(msg,1500);tone(120,0.4);updateHud();playing=false;
  setTimeout(()=>{document.getElementById('startBtn').style.display='block';document.getElementById('startBtn').textContent='TRY AGAIN'},2200);
}

// === ANAGLYPH 3D GLASSES ===
let anaglyph=false,anaglyphEffect=null;

window.toggle3D=function(){
  anaglyph=!anaglyph;
  const btn=document.getElementById('glassesBtn');
  const renderer=scene.renderer;
  const camera=scene.camera;

  if(anaglyph){
    btn.textContent='🕶️ 3D ON';btn.classList.add('on');

    // Create anaglyph effect
    const _stereo=new THREE.StereoCamera();
    _stereo.eyeSep=0.064;
    const size=renderer.getSize(new THREE.Vector2());
    const rtL=new THREE.WebGLRenderTarget(size.x,size.y);
    const rtR=new THREE.WebGLRenderTarget(size.x,size.y);

    const mat=new THREE.ShaderMaterial({
      uniforms:{mapL:{value:rtL.texture},mapR:{value:rtR.texture}},
      vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
      fragmentShader:'uniform sampler2D mapL;uniform sampler2D mapR;varying vec2 vUv;void main(){vec4 l=texture2D(mapL,vUv);vec4 r=texture2D(mapR,vUv);gl_FragColor=vec4(l.r*0.7+l.g*0.3,r.g,r.b,1.0);}'
    });

    const quad=new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat);
    const ortho=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    const screenScene=new THREE.Scene();
    screenScene.add(quad);

    anaglyphEffect={stereo:_stereo,rtL:rtL,rtR:rtR,mat:mat,ortho:ortho,screenScene:screenScene};

    // Override render
    const origBind=scene.renderer.render;
    scene.renderer._origRender=origBind;

    scene.addEventListener('loaded',function(){});

    // Use tick to do custom render
    scene.setAttribute('renderer','render:false');

    function anaglyphRender(){
      if(!anaglyph){return}
      const scn=scene.object3D;
      const cam=scene.camera;
      const sz=renderer.getSize(new THREE.Vector2());

      if(rtL.width!==sz.x){rtL.setSize(sz.x,sz.y);rtR.setSize(sz.x,sz.y)}

      _stereo.update(cam);

      renderer.setRenderTarget(rtL);renderer.clear();renderer.render(scn,_stereo.cameraL);
      renderer.setRenderTarget(rtR);renderer.clear();renderer.render(scn,_stereo.cameraR);
      renderer.setRenderTarget(null);renderer.render(screenScene,ortho);

      if(anaglyph) requestAnimationFrame(anaglyphRender);
    }
    requestAnimationFrame(anaglyphRender);

  }else{
    btn.textContent='🕶️ 3D GLASSES';btn.classList.remove('on');
    if(anaglyphEffect){
      anaglyphEffect.rtL.dispose();anaglyphEffect.rtR.dispose();
      anaglyphEffect=null;
    }
  }
};

scene.addEventListener('loaded',()=>{buildGrid();updateHud();updateClock()});

})();
</script>
</body>
</html>
