<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reactific Promethean 5x10 Court</title>
<style>
:root{
  --black:#040404; --white:#ffffff; --muted:#8c8c96; --line:rgba(255,255,255,.14);
  --lime:#39FF14; --gold:#FFD700; --cyan:#00bbf0; --red:#ff3b3b;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%; height:100%; overflow:hidden;
  background:
    radial-gradient(circle at top left,rgba(0,187,240,.10),transparent 32%),
    radial-gradient(circle at bottom right,rgba(242,138,31,.10),transparent 34%),
    var(--black);
  color:var(--white);
  font-family:Arial,Helvetica,sans-serif;
  user-select:none;
}
.app{
  width:100vw;
  height:100vh;
  padding:22px;
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  gap:18px;
}
.topbar{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
}
.brand{
  font-size:clamp(1.6rem,3vw,3rem);
  font-weight:900;
  letter-spacing:.12em;
}
.brand span{color:var(--lime)}
.mode{
  justify-self:center;
  border:1px solid rgba(57,255,20,.35);
  background:rgba(57,255,20,.08);
  color:var(--lime);
  border-radius:999px;
  padding:10px 20px;
  font-weight:900;
  letter-spacing:.12em;
  font-size:clamp(.8rem,1.4vw,1.2rem);
}
.clockbox{
  justify-self:end;
  display:flex;
  align-items:center;
  gap:14px;
  border:1px solid rgba(255,59,59,.35);
  background:rgba(255,59,59,.08);
  border-radius:18px;
  padding:10px 18px;
}
.clock-label{
  color:var(--muted);
  font-weight:900;
  letter-spacing:.12em;
  font-size:clamp(.7rem,1.2vw,1rem);
}
.clock-num{
  font-size:clamp(2.3rem,5vw,5rem);
  line-height:1;
  color:var(--red);
  font-weight:900;
  text-shadow:0 0 22px rgba(255,59,59,.6);
}
.targetbar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  border:1px solid rgba(255,215,0,.25);
  background:rgba(255,215,0,.055);
  border-radius:22px;
  padding:14px 18px;
}
.target-title{
  color:var(--gold);
  font-weight:900;
  letter-spacing:.14em;
  font-size:clamp(1rem,2vw,2rem);
}
.targets{
  display:flex;
  gap:16px;
}
.target{
  min-width:clamp(82px,8vw,150px);
  text-align:center;
  padding:8px 16px;
  border-radius:18px;
  border:2px solid rgba(57,255,20,.45);
  background:rgba(57,255,20,.10);
  color:var(--lime);
  font-size:clamp(2rem,5vw,5rem);
  font-weight:900;
  line-height:1;
  text-shadow:0 0 22px rgba(57,255,20,.55);
}
.court-wrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.court{
  width:min(96vw, calc(96vh * 1.75));
  height:min(66vh, calc(96vw / 1.75));
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:10px;
  padding:16px;
  background:rgba(255,255,255,.045);
  border:2px solid var(--line);
  border-radius:28px;
  box-shadow:0 0 60px rgba(0,0,0,.55);
}
.cell{
  border:2px solid rgba(255,255,255,.14);
  border-radius:14px;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(1.8rem,4vw,4.6rem);
  font-weight:900;
  color:rgba(255,255,255,.72);
}
.cell.target{
  background:var(--lime);
  border-color:var(--lime);
  color:#001400;
  box-shadow:0 0 28px rgba(57,255,20,.68);
  transform:scale(1.03);
}
.cell.hit{
  background:var(--cyan);
  border-color:var(--cyan);
  color:#001018;
  box-shadow:0 0 28px rgba(0,187,240,.6);
}
.bottombar{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
}
.stat{
  color:var(--muted);
  font-weight:900;
  letter-spacing:.1em;
  font-size:clamp(.9rem,1.6vw,1.4rem);
}
.stat b{color:var(--lime)}
.start{
  border:none;
  background:linear-gradient(135deg,var(--lime),#2bc10f);
  color:#001400;
  font-weight:900;
  letter-spacing:.14em;
  font-size:clamp(1.1rem,2vw,2rem);
  border-radius:999px;
  padding:18px 42px;
  cursor:pointer;
  box-shadow:0 0 34px rgba(57,255,20,.35);
}
.right{text-align:right}
@media(max-width:900px){
  html,body{overflow:auto}
  .app{height:auto;min-height:100vh}
  .topbar,.bottombar{grid-template-columns:1fr;text-align:center}
  .clockbox,.mode{justify-self:center}
  .court{
    width:94vw;
    height:auto;
    aspect-ratio:1/1;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(5,1fr);
  }
  .cell:nth-child(n+26){display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">REACTIFIC<span>™</span></div>
    <div class="mode">PROMETHEAN 5×10 COURT</div>
    <div class="clockbox">
      <div class="clock-label">SHOT CLOCK</div>
      <div class="clock-num">05</div>
    </div>
  </div>

  <div class="targetbar">
    <div class="target-title">FIND</div>
    <div class="targets">
      <div class="target">7</div>
      <div class="target">28</div>
      <div class="target">41</div>
    </div>
  </div>

  <div class="court-wrap">
    <div class="court">
      <div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell">4</div><div class="cell">5</div><div class="cell">6</div><div class="cell target">7</div><div class="cell">8</div><div class="cell">9</div><div class="cell">10</div>
      <div class="cell">11</div><div class="cell">12</div><div class="cell">13</div><div class="cell">14</div><div class="cell">15</div><div class="cell">16</div><div class="cell">17</div><div class="cell">18</div><div class="cell">19</div><div class="cell">20</div>
      <div class="cell">21</div><div class="cell">22</div><div class="cell">23</div><div class="cell">24</div><div class="cell">25</div><div class="cell">26</div><div class="cell">27</div><div class="cell target">28</div><div class="cell">29</div><div class="cell">30</div>
      <div class="cell">31</div><div class="cell">32</div><div class="cell">33</div><div class="cell">34</div><div class="cell">35</div><div class="cell">36</div><div class="cell">37</div><div class="cell">38</div><div class="cell">39</div><div class="cell">40</div>
      <div class="cell target">41</div><div class="cell">42</div><div class="cell">43</div><div class="cell">44</div><div class="cell">45</div><div class="cell hit">46</div><div class="cell">47</div><div class="cell">48</div><div class="cell">49</div><div class="cell">50</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="stat">COURT: <b>5×10</b></div>
    <button class="start">START ROUND</button>
    <div class="stat right">TARGETS: <b>3</b></div>
  </div>
</div>
</body>
</html>
